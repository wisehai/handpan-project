workflows:
  ios-handpan:
    name: WisePan
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Name must match the App Store Connect API key integration you create
      # in Codemagic team settings (see ios-app/README.md step 3-4).
      app_store_connect: WiseHai
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.wisehai.handpan
      node: 22
      vars:
        # SPM-based Capacitor project: build from .xcodeproj, no workspace exists
        XCODE_PROJECT: "ios-app/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Copy web app into ios-app/www
        script: |
          # Ensure target directory exists (git does not track empty dirs)
          mkdir -p ios-app/www/vendor/pdfjs
          cp handpan-player.html ios-app/www/index.html
          cp vendor/pdfjs/pdf.min.js ios-app/www/vendor/pdfjs/pdf.min.js
          cp vendor/pdfjs/pdf.worker.min.js ios-app/www/vendor/pdfjs/pdf.worker.min.js
      - name: Install npm dependencies
        script: |
          cd ios-app && npm ci
      - name: Add iOS platform (regenerated fresh on every build — see ios-app/README.md)
        script: |
          cd ios-app && npx cap add ios
      - name: Declare microphone usage (跟弹模式; the generated Info.plist has no mic entry)
        script: |
          plutil -replace NSMicrophoneUsageDescription \
            -string "跟弹模式需要使用麦克风识别你的手碟演奏" \
            ios-app/ios/App/App/Info.plist
      - name: Restrict target to iPhone only (Capacitor's default template is Universal)
        script: |
          cd ios-app/ios/App
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2";/TARGETED_DEVICE_FAMILY = "1";/g' App.xcodeproj/project.pbxproj
      - name: Generate app icons from assets/
        script: |
          cd ios-app && npx capacitor-assets generate --ios
      - name: Sync web assets and install CocoaPods dependencies
        script: |
          cd ios-app && npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Inspect generated iOS project
        script: |
          # See what cap add ios actually produced
          ls -la ios-app/ios/App/
      - name: Set build number
        script: |
          cd ios-app/ios/App
          # Use Codemagic's build index as CFBundleVersion (monotonically increasing)
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --ipa-directory ios-app/ios/App/build/ios/ipa
    artifacts:
      - ios-app/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
