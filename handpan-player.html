/* ==================== Follow mode (跟弹) ==============================
 * The mic drives the score cursor instead of the scheduler: detect strike
 * onsets in the input spectrum, classify them against the pan's 13 known
 * notes, and advance the highlighted column when the expected note is heard.
 * The highlighted column is always "the note to play next".              */
const btnFollow     = document.getElementById('btnFollow');
const btnFollowExit = document.getElementById('btnFollowExit');
const followBar     = document.getElementById('followBar');
const followState   = document.getElementById('followState');
const chkLenient    = document.getElementById('chkLenient');

const FOLLOW_FFT = 8192;      // classification: 5.9 Hz bins resolve semitones
const DETECT_FFT = 2048;      // onset detection: 43 ms window follows fast playing
/* Detection tuning — revisit with real-pan feedback (mic distance, room,
 * phone AGC). The sensitivity slider scales the onset threshold at runtime. */
const FOLLOW = {
  fluxRatio:    2.3,    // onset when weighted flux exceeds this × its average
  minFluxRel:   0.3,    // flux floor relative to the average frame magnitude —
                        // level-adaptive because iOS raw (AGC-off) mic input
                        // sits ~10× below desktop levels and absolute floors
                        // never fire there. iPhone hardware voice processing
                        // also halves the strike transient relative to the
                        // ringing background (measured: sens 2.5 on iOS ≈
                        // sens 1.2 on Android at the earlier 0.6 floor), so
                        // the floor sits low and desktop relies on fluxRatio
  minFlux:      0.005,  // last-resort absolute floor for near-silence (magEma≈0)
  minLevelDb:   -76,    // ignore onsets whose loudest bin is below this
  refractoryMs: 120,    // one strike = one onset
  classifyDelayMs: 70,  // let partials develop past the strike noise
  preSnapshotMs: 90,    // how far before the onset the reference spectrum sits
  emaFreezeMs:  250,    // don't let a fresh strike raise the adaptive floor
  matchTopN:    2,      // expected note in top-N classifier picks = correct
  catchUpAhead: 2,      // strict mode may jump this many playable columns ahead
  slapHighRatio: 0.9,   // high-band vs mid-band energy ratio that reads as S
};

let followOn = false, followPos = 0, followRaf = 0;
let micStream = null, micSource = null, micAnalyser = null, micDetector = null;
let followCtx = null;   // dedicated analysis context (see startFollow)
let micTrackRate = 0;   // sample rate the mic track reports, 0 = unknown
let followTpls = null, followBinHz = 0;
let fluxEma = 0, magEma = 0, lastOnsetAt = 0;
let detCur = null, detPrev = null, detReady = false, detWeight = null, detLo = 0, detHi = 0;
let snapRing = null, snapIdx = 0, preSpec = null, postSpec = null, deltaSpec = null;
let meterFrame = 0, wakeLock = null, lastFollowRow = null;
const sensSlider = document.getElementById('sensSlider');
const sensValue = document.getElementById('sensValue');
const micMeterFill = document.querySelector('#micMeter i');
{
  const saved = store() && store().getItem('handpan_sens');
  if (saved && sensSlider) sensSlider.value = saved;
}
function updateSensitivity(){
  if (!sensSlider) return;
  if (sensValue) sensValue.value = Number(sensSlider.value).toFixed(1);
  const s = store(); if (s) s.setItem('handpan_sens', sensSlider.value);
}
if (sensSlider){
  updateSensitivity();
  sensSlider.addEventListener('input', updateSensitivity);
}

/* Spectral templates from the measured note tables: bin positions of the
 * fundamental and partials, fundamental overweighted so octave-sharing
 * fields (e.g. 4 = D4 = 2× the Ding) resolve to the struck note.          */
function buildFollowTemplates(sampleRate){
  followBinHz = sampleRate / FOLLOW_FFT;
  followTpls = [];
  for (const key of Object.keys(TIMBRE)){
    const note = NOTES[key];
    if (!note) continue;
    const parts = [];
    for (const [mult, amp] of TIMBRE[key].partials){
      const freq = note.freq * mult;
      if (freq < 70 || freq > 8500) continue;
      parts.push({bin: Math.round(freq / followBinHz), w: mult === 1 ? 2.5 : Math.min(1, amp)});
    }
    followTpls.push({key, parts, wSum: parts.reduce((s, p) => s + p.w, 0),
      fundBin: Math.round(note.freq / followBinHz),
      subBin: note.freq / 2 >= 70 ? Math.round(note.freq / 2 / followBinHz) : 0,
      // only notes with a genuinely strong sub-fundamental mode (T: D3 under
      // the D4 shoulder) are exempt from the octave-confusion penalty below;
      // faint sub partials (10, 11) must not shield against it
      hasSubPartial: TIMBRE[key].partials.some(p => p[0] < 0.9 && p[1] >= 0.3)});
  }
}

/* Rank all notes by template match against one LINEAR-magnitude spectrum.
 * In follow mode this is a post-onset minus pre-onset difference spectrum,
 * so notes still ringing from earlier strikes cancel out and only the new
 * strike's energy is scored — long handpan sustain no longer masks it.
 * Returns [{key, score}] best-first; slap is prepended when the strike is
 * broadband-high with little tonal support.                               */
function classifyFollowSpectrum(spec){
  // ±1 bin (≈±6 Hz): tolerant of slight detuning, tight enough to keep
  // semitone neighbours (A3 220 vs Bb3 233) from capturing each other.
  const peakAround = bin => {
    let m = 0;
    for (let i = Math.max(1, bin - 1); i <= bin + 1 && i < spec.length; i++)
      if (spec[i] > m) m = spec[i];
    return m;
  };
  const scores = followTpls.map(t => {
    let s = 0;
    for (const p of t.parts) s += p.w * peakAround(p.bin);
    s /= t.wSum;
    // Octave disambiguation: strong energy one octave below the candidate's
    // fundamental means the lower note was struck and we're seeing its 2×
    // partial (e.g. 4 = D4 rings loudest at D5, which would fool 10 = D5).
    if (!t.hasSubPartial && t.subBin && peakAround(t.subBin) > peakAround(t.fundBin) * 0.5)
      s *= 0.4;
    return {key: t.key, score: s};
  }).sort((a, b) => b.score - a.score);
  const binAt = f => Math.max(1, Math.min(spec.length - 1, Math.round(f / followBinHz)));
  let mid = 0, high = 0;
  for (let i = binAt(150), e = binAt(3500); i < e; i++) mid += spec[i];
  for (let i = binAt(3500), e = binAt(9000); i < e; i++) high += spec[i];
  if (high > mid * FOLLOW.slapHighRatio)
    scores.unshift({key: 'S', score: (scores[0] ? scores[0].score : 0) + 1});
  return scores;
}

// The column the player should hit next: skip rests, wrap at the end.
function followTargetIdx(){
  let i = followPos;
  while (i < events.length && !events[i].hits.length) i++;
  if (i >= events.length){
    i = 0;
    while (i < events.length && !events[i].hits.length) i++;
    if (i >= events.length) return -1;
    followPos = i;
  }
  return i;
}

function followMiss(idx){
  const col = trackView.querySelector('.col[data-event="' + idx + '"]');
  if (!col) return;
  col.classList.remove('miss');
  void col.offsetWidth;                       // restart the animation
  col.classList.add('miss');
  col.addEventListener('animationend', () => col.classList.remove('miss'), {once: true});
}

// D and the shoulder T share nearly all strong modes on a real pan. Keep the
// classifier's honest ranking in the status bar, but accept either for score
// progress so this physical ambiguity cannot pin the cursor in place.
function followKeysMatch(expected, heard){
  return expected === heard ||
    ((expected === 'D' || expected === 'T') && (heard === 'D' || heard === 'T'));
}
function followExpectedMatches(hits, heardKeys){
  return hits.some(h => heardKeys.some(heard => followKeysMatch(h.key, heard)));
}

// Advance the cursor past playable column idx and highlight the next target.
function followAdvance(idx){
  for (const h of events[idx].hits) flashPad(h.key, h.hand);
  followPos = idx + 1;
  const next = followTargetIdx();
  if (next >= 0) highlightToken(next);
}

// A tap on the score while following retargets the cursor there silently —
// it must never play audio, or the mic would hear the app's own output.
function followJumpTo(evIdx){
  followPos = evIdx;
  const idx = followTargetIdx();
  if (idx >= 0) highlightToken(idx);
}

function handleFollowOnset(){
  if (!followOn) return;
  micAnalyser.getFloatFrequencyData(postSpec);
  for (let i = 0; i < deltaSpec.length; i++){
    const post = Math.pow(10, Math.max(-100, postSpec[i]) / 20);
    const pre = Math.pow(10, Math.max(-100, preSpec[i]) / 20);
    deltaSpec[i] = post > pre ? post - pre : 0;
  }
  const scores = classifyFollowSpectrum(deltaSpec);
  if (!scores.length) return;
  followState.textContent = tr('followHeard', scores[0].key, scores[1] && scores[1].key);
  const idx = followTargetIdx();
  if (idx < 0) return;
  const top = scores.slice(0, FOLLOW.matchTopN).map(s => s.key);
  if (chkLenient.checked || followExpectedMatches(events[idx].hits, top)){
    followAdvance(idx);
    return;
  }
  // Catch-up: a confident exact match on one of the NEXT columns means the
  // player is already past a missed detection — jump to them instead of
  // pinning the cursor behind forever.
  let ahead = idx;
  for (let n = 0; n < FOLLOW.catchUpAhead; n++){
    followPos = ahead + 1;
    ahead = followTargetIdx();
    if (ahead < 0 || ahead === idx) break;
    if (followExpectedMatches(events[ahead].hits, [scores[0].key])){
      followAdvance(ahead);
      return;
    }
  }
  followPos = idx;               // no catch-up match: stay put
  followMiss(idx);
}

// Copy the ring snapshot closest to preSnapshotMs old as the onset reference.
function capturePreSpec(now){
  let best = null, bestErr = Infinity;
  for (const slot of snapRing){
    const err = Math.abs(now - slot.t - FOLLOW.preSnapshotMs);
    if (err < bestErr){ bestErr = err; best = slot; }
  }
  if (best) preSpec.set(best.data);
}

function followLoop(){
  if (!followOn) return;
  const now = performance.now();
  // rotate a full-resolution snapshot; one of these becomes the "before the
  // strike" reference that the difference spectrum subtracts
  const slot = snapRing[snapIdx];
  micAnalyser.getFloatFrequencyData(slot.data);
  slot.t = now;
  snapIdx = (snapIdx + 1) % snapRing.length;

  // onset detection on the short-window analyser: high-frequency-weighted
  // flux makes the strike's broadband attack stand out over ringing tails
  micDetector.getFloatFrequencyData(detCur);
  let flux = 0, mag = 0, peakDb = -Infinity;
  for (let i = detLo; i < detHi; i++){
    const c = Math.pow(10, Math.max(-100, detCur[i]) / 20);
    const p = Math.pow(10, Math.max(-100, detPrev[i]) / 20);
    mag += c * detWeight[i];
    if (c > p) flux += (c - p) * detWeight[i];
    if (detCur[i] > peakDb) peakDb = detCur[i];
  }
  [detCur, detPrev] = [detPrev, detCur];
  if (micMeterFill && (meterFrame++ & 3) === 0)
    micMeterFill.style.width = Math.max(0, Math.min(100, (peakDb + 80) * (100 / 55))) + '%';
  if (detReady){
    const sens = Number(sensSlider && sensSlider.value) || 1;
    const thresh = Math.max(FOLLOW.minFlux, FOLLOW.minFluxRel * magEma,
                            fluxEma * FOLLOW.fluxRatio) / sens;
    if (flux > thresh && peakDb > FOLLOW.minLevelDb &&
        now - lastOnsetAt > FOLLOW.refractoryMs){
      lastOnsetAt = now;
      capturePreSpec(now);
      setTimeout(handleFollowOnset, FOLLOW.classifyDelayMs);
    }
    // a fresh strike must not raise the adaptive floors and mask fast runs
    if (now - lastOnsetAt > FOLLOW.emaFreezeMs){
      fluxEma = fluxEma * 0.9 + flux * 0.1;
      magEma = magEma * 0.9 + mag * 0.1;
    }
    const dbg = document.getElementById('micDebug');
    if (dbg && (meterFrame & 31) === 0)
      dbg.textContent = peakDb.toFixed(0) + 'dB · f ' + flux.toFixed(3) + '/' +
        thresh.toFixed(3) + ' · ctx' + (micDetector.context.sampleRate / 1000) +
        'k/mic' + (micTrackRate ? micTrackRate / 1000 + 'k' : '?');
  }
  detReady = true;
  followRaf = requestAnimationFrame(followLoop);
}

async function acquireWakeLock(){
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e){ wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (followOn && document.visibilityState === 'visible') acquireWakeLock();
});

// Create an analysis AudioContext and prove it runs; null when it can't
// (e.g. WebKit refuses resume() because the user activation was already
// consumed by getUserMedia). Callers fall back rather than fail.
async function tryAnalysisCtx(opts){
  try {
    const c = new (window.AudioContext || window.webkitAudioContext)(opts);
    if (c.state === 'suspended') await c.resume();
    if (c.state === 'running') return c;
    c.close();
  } catch (e){}
  return null;
}

async function startFollow(){
  if (followOn) return;
  if (!events.some(e => e.hits.length)){ setStatus('emptyScore'); return; }
  if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
    setStatus('followNoMic'); return;
  }
  ensureCtx();
  stopPlay(true);
  let stream;
  try {
    // Raw signal: phone-side echo cancellation / AGC would eat the very
    // transients and level differences the detector keys on.
    stream = await navigator.mediaDevices.getUserMedia({audio: {
      echoCancellation: false, noiseSuppression: false, autoGainControl: false}});
  } catch (e){ setStatus('followMicDenied'); return; }
  micStream = stream;
  // Analyse on a context created AFTER the mic is live: iOS switches the
  // hardware to a record session (usually 48 kHz) when capture starts, and
  // WebKit's MediaStreamSource does not resample into an older context
  // running at the playback rate — the FFT frequency axis would be ~9% off
  // (more than a semitone) and every note would classify wrong. A fresh
  // context adopts the record session's rate. Fall back to the playback
  // context when it can't start (no worse than the previous behaviour).
  followCtx = await tryAnalysisCtx();
  const track = stream.getAudioTracks()[0];
  micTrackRate = (track && track.getSettings && track.getSettings().sampleRate) || 0;
  let mctx = followCtx || actx;
  // Hard guarantee: when the track reports its rate and the analysis context
  // disagrees, rebuild the context at that exact rate (Safari 14.1+ honours
  // the sampleRate option) so the template bins stay on the true axis.
  if (micTrackRate && mctx.sampleRate !== micTrackRate){
    const exact = await tryAnalysisCtx({sampleRate: micTrackRate});
    if (exact){
      if (followCtx) followCtx.close();
      followCtx = exact;
      mctx = exact;
    }
  }
  micSource = mctx.createMediaStreamSource(stream);
  micAnalyser = mctx.createAnalyser();         // classification (fine bins)
  micAnalyser.fftSize = FOLLOW_FFT;
  micAnalyser.smoothingTimeConstant = 0;
  micDetector = mctx.createAnalyser();         // onset detection (short window)
  micDetector.fftSize = DETECT_FFT;
  micDetector.smoothingTimeConstant = 0;
  micSource.connect(micAnalyser);              // analysis only, never to output
  micSource.connect(micDetector);
  buildFollowTemplates(mctx.sampleRate);
  const bins = micAnalyser.frequencyBinCount, detBins = micDetector.frequencyBinCount;
  const detBinHz = mctx.sampleRate / DETECT_FFT;
  preSpec = new Float32Array(bins); postSpec = new Float32Array(bins);
  deltaSpec = new Float32Array(bins);
  snapRing = Array.from({length: 8}, () => ({t: 0, data: new Float32Array(bins)}));
  snapIdx = 0;
  detCur = new Float32Array(detBins); detPrev = new Float32Array(detBins);
  detLo = Math.max(1, Math.round(75 / detBinHz));
  detHi = Math.min(detBins, Math.round(10000 / detBinHz));
  detWeight = new Float32Array(detBins);
  for (let i = detLo; i < detHi; i++)
    detWeight[i] = Math.min(3, 0.5 + (i * detBinHz) / 3000);   // HFC emphasis
  detReady = false; fluxEma = 0; magEma = 0; lastOnsetAt = 0; meterFrame = 0;
  followOn = true;
  followPos = 0;
  lastFollowRow = null;
  document.body.classList.add('follow');
  followBar.hidden = false;
  followState.textContent = tr('followListening');
  // #micdebug in the URL surfaces live detector numbers next to the status —
  // the only way to read them on a phone, where devtools aren't reachable.
  if (location.hash.indexOf('micdebug') !== -1 && !document.getElementById('micDebug')){
    const d = document.createElement('span');
    d.id = 'micDebug';
    d.style.cssText = 'font:11px/1.2 ui-monospace,monospace;opacity:.7;margin-left:8px;';
    followState.after(d);
  }
  computeRowBands();   // follow mode's larger font reflows the score into new rows
  const first = followTargetIdx();
  if (first >= 0) highlightToken(first);
  // Best-effort niceties; each is unsupported somewhere (iOS: both). Fullscreen
  // can itself change the viewport (e.g. hiding browser chrome), so re-band
  // afterward too — fullscreenchange listener below also catches this.
  try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (e){}
  try { if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape'); } catch (e){}
  acquireWakeLock();
  updateStandaloneMetro();     // silence the metronome while following
  followRaf = requestAnimationFrame(followLoop);
}

function stopFollow(){
  if (!followOn) return;
  followOn = false;
  lastFollowRow = null;
  cancelAnimationFrame(followRaf);
  if (micSource) micSource.disconnect();
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (followCtx){ try { followCtx.close(); } catch (e){} followCtx = null; }
  micStream = micSource = micAnalyser = micDetector = null;
  snapRing = preSpec = postSpec = deltaSpec = detCur = detPrev = detWeight = null;
  document.body.classList.remove('follow');
  followBar.hidden = true;
  if (wakeLock){ try { wakeLock.release(); } catch (e){} wakeLock = null; }
  try { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); } catch (e){}
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  trackView.querySelectorAll('.col.now').forEach(n => n.classList.remove('now'));
  setStatus('stopped');
  updateStandaloneMetro();
  scheduleRowBands();   // the embedded view's smaller font reflows the score
}

btnFollow.addEventListener('click', startFollow);
btnFollowExit.addEventListener('click', stopFollow);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && followOn){ stopFollow(); return; }
  if (followOn) return;
  const ae = document.activeElement;
  if (e.code === 'Space' && ae !== scoreText &&
      !['BUTTON', 'INPUT', 'SELECT'].includes(ae.tagName)){
    e.preventDefault();
    playing ? stopPlay() : startFrom(pos);
  }
});

/* ------------------------------ Init -------------------------------- */
// Score editor: collapsed by default on phones, open on desktop
const editWrap = document.getElementById('editWrap');
if (!window.matchMedia('(max-width:860px)').matches) editWrap.open = true;

document.body.classList.toggle('immersive', immersive);
setLang(lang);            // paints all static text + populates the library
prevSel = libSel.value;
loadSelected();           // built-in sample -> editor, parser, track view
</script>
