      <stop offset="0%" stop-color="#1c242c"/>
      <stop offset="60%" stop-color="#171d23"/>
      <stop offset="100%" stop-color="#0f1317"/>
    </radialGradient>
    <radialGradient id="shell" cx="38%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#414e59"/>
      <stop offset="55%" stop-color="#2c3742"/>
      <stop offset="100%" stop-color="#1b232b"/>
    </radialGradient>
    <radialGradient id="pad" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#f4f2ec"/>
