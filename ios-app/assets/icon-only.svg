  <circle cx="760" cy="369" r="88" fill="#8fc7e8" stroke="#10151a" stroke-width="6"/>
  <circle cx="760" cy="655" r="88" fill="#d8a45c" stroke="#10151a" stroke-width="6"/>
  <circle cx="512" cy="798" r="88" fill="#8fc7e8" stroke="#10151a" stroke-width="6"/>
  <circle cx="264" cy="655" r="88" fill="#d8a45c" stroke="#10151a" stroke-width="6"/>
  <circle cx="264" cy="369" r="88" fill="#8fc7e8" stroke="#10151a" stroke-width="6"/>
  <!-- T shoulder ring -->
  <circle cx="512" cy="512" r="163" fill="none" stroke="#4a5763" stroke-width="30"/>
  <!-- Ding -->
  <circle cx="512" cy="512" r="118" fill="url(#pad)" stroke="#10151a" stroke-width="6"/>
