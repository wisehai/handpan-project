<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手碟播放器 · Pocket Groove 11</title>
<style>
  /* ---------- Design tokens: nitrided-steel handpan palette ---------- */
  :root{
    --bg:        #0f1317;   /* deep charcoal, like a dark stage        */
    --panel:     #171d23;
    --panel-2:   #1c242c;
    --line:      #2a343e;
    --steel-hi:  #39454f;   /* pan shell highlight                     */
    --steel-lo:  #202932;   /* pan shell shadow                        */
    --pad:       #e9e6df;   /* tone-field ivory                        */
    --pad-dim:   #b9bcb9;
    --ink:       #e8e4dc;
    --muted:     #8b96a0;
    --brass:     #d8a45c;   /* strike glow — warm brass                */
    --brass-dp:  #a97b3d;
    --ding:     #c9d4dd;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;}
  body{min-height:100vh;padding:28px 20px 60px;}

  .wrap{max-width:1060px;margin:0 auto;}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px;}
  h1{font-size:26px;font-weight:600;letter-spacing:.04em;}
  h1 em{font-style:normal;color:var(--brass);}
  .sub{color:var(--muted);font-size:13px;letter-spacing:.06em;}
  .scale-tag{margin-left:auto;font-size:12px;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:4px 12px;}

  .grid{display:grid;grid-template-columns:minmax(340px,1fr) minmax(320px,420px);
    gap:22px;margin-top:18px;align-items:start;}
  @media (max-width:840px){.grid{grid-template-columns:1fr;}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;}
  .card h2{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.18em;
    text-transform:uppercase;margin-bottom:12px;}

  /* ---------- Pan ---------- */
  #panBox{display:flex;justify-content:center;}
  svg{max-width:520px;width:100%;height:auto;display:block;}
  .pad-circle{cursor:pointer;transition:filter .12s;}
  .pad-circle:hover{filter:brightness(1.12);}
  .pad-label{font-size:19px;font-weight:600;fill:#333c44;pointer-events:none;}
  .pad-num{font-size:12px;fill:#77828c;pointer-events:none;}
  .hit .pad-fill{fill:var(--brass);}
  .hit .pad-label,.hit .pad-num{fill:#2a1d0a;}
  .ripple{fill:none;stroke:var(--brass);stroke-width:2.5;pointer-events:none;
    animation:rip .55s ease-out forwards;}
  @keyframes rip{from{opacity:.85;transform:scale(1);}to{opacity:0;transform:scale(1.85);}}
  @media (prefers-reduced-motion:reduce){.ripple{animation:none;opacity:0;}}

  /* ---------- Transport ---------- */
  .transport{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;}
  button{font:inherit;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    border-radius:9px;padding:9px 16px;cursor:pointer;letter-spacing:.03em;}
  button:hover{border-color:var(--brass-dp);}
  button:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
  button.primary{background:var(--brass);border-color:var(--brass);color:#20160a;font-weight:600;
    min-width:96px;}
  button.primary:hover{background:#e4b26c;}
  label.chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
    cursor:pointer;user-select:none;}
  input[type=checkbox]{accent-color:var(--brass);width:15px;height:15px;}

  .sliders{margin-top:14px;display:grid;gap:12px;}
  .slider-row{display:grid;grid-template-columns:88px 1fr 62px;align-items:center;gap:10px;
    font-size:13px;color:var(--muted);}
  .slider-row output{color:var(--ink);font-variant-numeric:tabular-nums;text-align:right;}
  input[type=range]{width:100%;accent-color:var(--brass);height:4px;cursor:pointer;}

  /* ---------- Score ---------- */
  textarea{width:100%;min-height:170px;resize:vertical;background:#12171c;color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.7;
    font-family:"SF Mono",Consolas,Menlo,monospace;}
  textarea:focus-visible{outline:2px solid var(--brass);outline-offset:1px;}
  .score-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .hint{font-size:12px;color:var(--muted);line-height:1.8;margin-top:10px;}
  .hint code{background:var(--panel-2);border:1px solid var(--line);border-radius:4px;
    padding:0 5px;color:var(--brass);font-family:Consolas,Menlo,monospace;}

  #trackView{margin-top:14px;background:#12171c;border:1px solid var(--line);border-radius:10px;
    padding:12px;max-height:190px;overflow-y:auto;line-height:2.3;
    font-family:"SF Mono",Consolas,Menlo,monospace;font-size:13px;}
  .tok{display:inline-block;min-width:26px;text-align:center;border-radius:6px;padding:1px 5px;
    margin:0 2px;color:var(--pad-dim);cursor:pointer;}
  .tok:hover{background:var(--panel-2);}
  .tok.ding{color:var(--ding);font-weight:600;}
  .tok.rest{color:#4b565f;}
  .tok.now{background:var(--brass);color:#20160a;font-weight:700;}
  .bar{display:inline-block;width:1px;height:16px;background:var(--line);
    vertical-align:middle;margin:0 7px;}
  .vlabel{display:block;color:var(--muted);font-size:11px;letter-spacing:.14em;margin-top:6px;}
  .status{font-size:12px;color:var(--muted);margin-top:8px;min-height:16px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>手碟播放器 <em>Handpan</em></h1>
    <span class="sub">Pocket Groove 11 · Notepan</span>
    <span class="scale-tag">音阶：D Kurd 8+1 &nbsp;·&nbsp; D3 / A3 Bb3 C4 D4 E4 F4 G4 A4</span>
  </header>

  <div class="grid">
    <!-- ================= Left: pan + transport ================= -->
    <div class="card">
      <h2>手碟 · 点击音区可试听</h2>
      <div id="panBox">
        <svg id="pan" viewBox="0 0 500 500" role="img" aria-label="手碟布局图"></svg>
      </div>

      <div class="transport">
        <button class="primary" id="btnPlay">▶ 播放</button>
        <button id="btnStop">■ 停止</button>
        <label class="chk"><input type="checkbox" id="chkLoop" checked>循环</label>
        <label class="chk"><input type="checkbox" id="chkMetro">节拍器</label>
      </div>

      <div class="sliders">
        <div class="slider-row">
          <span>速度 BPM</span>
          <input type="range" id="bpm" min="50" max="200" value="110" step="1">
          <output id="bpmVal">110</output>
        </div>
        <div class="slider-row">
          <span>音量</span>
          <input type="range" id="vol" min="0" max="100" value="75" step="1">
          <output id="volVal">75%</output>
        </div>
      </div>
      <div class="status" id="status"></div>
    </div>

    <!-- ================= Right: score ================= -->
    <div class="card">
      <h2>乐谱（可编辑）</h2>
      <textarea id="scoreText" spellcheck="false"></textarea>
      <div class="score-actions">
        <button id="btnApply">应用乐谱</button>
        <button id="btnReset">恢复 Pocket Groove 11</button>
      </div>
      <div class="hint">
        记法：<code>D</code> = 中心 Ding，<code>1</code>–<code>8</code> = 音区编号，
        <code>.</code> = 休止（空八分音符），<code>|</code> = 小节线（仅显示用），
        <code>D+4</code> = 双手同击，<code>#</code> 开头为注释行。
        每个记号占一个八分音符。点击下方任意记号可从该处开始播放。
      </div>
      <div id="trackView"></div>
    </div>
  </div>
</div>

<script>
'use strict';
/* =====================================================================
 * Handpan player — D Kurd 8+1
 * Web Audio synthesis + SVG visualization + text score playback
 * ===================================================================== */

/* ---------- Note table (name, frequency, ring angle from top, CW) ---- */
const NOTES = {
  'D': { name:'D3', freq:146.83, ding:true },
  '1': { name:'A3',  freq:220.00, angle:180 },
  '2': { name:'Bb3', freq:233.08, angle:225 },
  '3': { name:'C4',  freq:261.63, angle:135 },
  '4': { name:'D4',  freq:293.66, angle:270 },
  '5': { name:'E4',  freq:329.63, angle: 90 },
  '6': { name:'F4',  freq:349.23, angle:315 },
  '7': { name:'G4',  freq:392.00, angle: 45 },
  '8': { name:'A4',  freq:440.00, angle:  0 },
};

/* ---------- Default score: transcription of Notepan Pocket Groove 11.
 * Straight 8th notes; PDF text layout is ambiguous about exact rhythm,
 * so edit freely (add "." rests or "D+1" double hits as needed). ------ */
const DEFAULT_SCORE = `# Pocket Groove 11 (D Kurd 8+1)  BPM=110
# Variation 1
D 4 1 4 D 1 4 D 4 1 | D 4 1 D 4 1 4 D 1 4 |
D 5 2 5 D 2 5 D 5 2 | D 5 2 D 5 2 5 D 2 5 |
D 6 1 6 D 1 6 D 6 1 | D 6 1 D 6 1 6 D 1 6 |
# Variation 2
D 7 2 7 D 2 7 D 7 2 | D 7 2 D 7 2 7 D 2 7 |
# Variation 3
D 8 1 7 D 1 6 D 8 1 | 7 D 1 6 D 8 1 7 D 1 6 |
D 8 2 7 D 2 6 D 8 2 | 7 D 2 6 D 8 2 7 D 2 6 |
D 8 1 7 D 1 6 D 8 1 | 7 D 1 6 D 8 1 7 D 1 6 |
# Variation 4
D 6 2 6 D 2 6 D 6 2 | D 6 2 D 4 1 4 D 1 4 |
D`;

/* =========================== Build the SVG pan ======================= */
const SVG_NS = 'http://www.w3.org/2000/svg';
const pan = document.getElementById('pan');
const CX = 250, CY = 250, RING_R = 168, PAD_R = 40, DING_R = 52;
const padEls = {};   // key -> {g, cx, cy, r}

function el(tag, attrs, parent){
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(n);
  return n;
}

function buildPan(){
  // defs: metallic shell gradient
  const defs = el('defs', {}, pan);
  const grad = el('radialGradient', {id:'shell', cx:'38%', cy:'32%', r:'85%'}, defs);
  el('stop', {offset:'0%',  'stop-color':'#414e59'}, grad);
  el('stop', {offset:'55%', 'stop-color':'#2c3742'}, grad);
  el('stop', {offset:'100%','stop-color':'#1b232b'}, grad);
  const padGrad = el('radialGradient', {id:'padg', cx:'40%', cy:'35%', r:'80%'}, defs);
  el('stop', {offset:'0%',  'stop-color':'#f4f2ec'}, padGrad);
  el('stop', {offset:'100%','stop-color':'#d5d3ca'}, padGrad);

  // shell + rim
  el('circle', {cx:CX, cy:CY, r:228, fill:'url(#shell)', stroke:'#465360', 'stroke-width':2}, pan);
  el('circle', {cx:CX, cy:CY, r:214, fill:'none', stroke:'#161d24', 'stroke-width':1.5, opacity:.7}, pan);

  const makePad = (key, cx, cy, r) => {
    const g = el('g', {class:'pad-circle', tabindex:0, role:'button',
                       'aria-label':'音区 ' + key}, pan);
    el('circle', {class:'pad-fill', cx, cy, r, fill:'url(#padg)',
                  stroke:'#10151a', 'stroke-width':2}, g);
    const n = NOTES[key];
    el('text', {class:'pad-label', x:cx, y:cy + (n.ding ? 0 : -2),
                'text-anchor':'middle', 'dominant-baseline':'middle'}, g)
      .textContent = n.name;
    el('text', {class:'pad-num', x:cx, y:cy + 18,
                'text-anchor':'middle'}, g)
      .textContent = n.ding ? 'Ding' : key;
    const trigger = () => { ensureCtx(); playHit(key, actx.currentTime, 0.9); flashPad(key); };
    g.addEventListener('click', trigger);
    g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(); } });
    padEls[key] = {g, cx, cy, r};
  };

  for (const key in NOTES){
    const n = NOTES[key];
    if (n.ding){ makePad(key, CX, CY, DING_R); continue; }
    const a = n.angle * Math.PI / 180;
    makePad(key, CX + RING_R * Math.sin(a), CY - RING_R * Math.cos(a), PAD_R);
  }
}
buildPan();

/* ------------------------- Visual strike ----------------------------- */
function flashPad(key){
  const p = padEls[key];
  if (!p) return;
  p.g.classList.add('hit');
  setTimeout(() => p.g.classList.remove('hit'), 140);
  // expanding ripple ring
  const rp = el('circle', {class:'ripple', cx:p.cx, cy:p.cy, r:p.r,
                           style:'transform-origin:' + p.cx + 'px ' + p.cy + 'px'}, pan);
  setTimeout(() => rp.remove(), 600);
}

/* ============================ Audio engine =========================== */
let actx = null, master = null;

function ensureCtx(){
  if (!actx){
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain();
    master.gain.value = volSlider.value / 100 * 0.85;
    const comp = actx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.ratio.value = 4;
    master.connect(comp); comp.connect(actx.destination);
  }
  if (actx.state === 'suspended') actx.resume();
}

/* Synthesize one handpan strike: fundamental + octave + compound fifth,
 * short noise transient for the finger "tak". */
function playHit(key, t, vel){
  const note = NOTES[key];
  if (!note) return;
  const dur = note.ding ? 3.0 : 2.1;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.5 * vel, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  g.connect(master);

  // partials tuned like a handpan tone field: f, 2f, 3f (+ faint 4.2f shimmer)
  const partials = [[1, 1.0], [2, 0.55], [3, 0.22], [4.16, 0.05]];
  for (const [mult, amp] of partials){
    const o = actx.createOscillator();
    o.type = 'sine';
    o.frequency.value = note.freq * mult;
    o.detune.value = (Math.random() * 6) - 3;   // slight inharmonic drift
    const og = actx.createGain();
    og.gain.value = amp;
    o.connect(og); og.connect(g);
    o.start(t); o.stop(t + dur + 0.1);
  }

  // attack transient: 30 ms band-passed noise burst
  const nLen = Math.floor(actx.sampleRate * 0.03);
  const buf = actx.createBuffer(1, nLen, actx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < nLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / nLen);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = note.freq * 2.5; bp.Q.value = 1.2;
  const ng = actx.createGain(); ng.gain.value = 0.35 * vel;
  src.connect(bp); bp.connect(ng); ng.connect(g);
  src.start(t);
}

function playTick(t, strong){
  // metronome click
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'square'; o.frequency.value = strong ? 1600 : 1100;
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.05);
}

/* ============================ Score parsing =========================== */
/* Event: {keys:[...], tokenIdx}   Token list also keeps '|' for display. */
let tokens = [];   // [{text, type:'note'|'rest'|'bar'|'label', eventIdx}]
let events = [];   // playable events, each 1 eighth note long

function parseScore(text){
  tokens = []; events = [];
  const lines = text.split('\n');
  for (const line of lines){
    const trimmed = line.trim();
    if (trimmed.startsWith('#')){
      tokens.push({text: trimmed.replace(/^#\s*/, ''), type:'label'});
      continue;
    }
    for (const raw of trimmed.split(/\s+/)){
      if (!raw) continue;
      if (raw === '|'){ tokens.push({text:'|', type:'bar'}); continue; }
      if (raw === '.'){ 
        tokens.push({text:'·', type:'rest', eventIdx: events.length});
        events.push({keys: [], tokenIdx: tokens.length - 1});
        continue;
      }
      const keys = raw.split('+').filter(k => NOTES[k]);
      if (keys.length === 0) continue;   // skip unknown tokens silently
      tokens.push({text: raw, type:'note', eventIdx: events.length,
                   ding: keys.includes('D')});
      events.push({keys, tokenIdx: tokens.length - 1});
    }
  }
  renderTrack();
}

/* --------------------------- Track display --------------------------- */
const trackView = document.getElementById('trackView');
function renderTrack(){
  trackView.innerHTML = '';
  tokens.forEach((tk, i) => {
    if (tk.type === 'label'){
      const s = document.createElement('span');
      s.className = 'vlabel'; s.textContent = tk.text;
      trackView.appendChild(s);
    } else if (tk.type === 'bar'){
      const s = document.createElement('span');
      s.className = 'bar';
      trackView.appendChild(s);
    } else {
      const s = document.createElement('span');
      s.className = 'tok' + (tk.type === 'rest' ? ' rest' : '') + (tk.ding ? ' ding' : '');
      s.textContent = tk.text;
      s.dataset.event = tk.eventIdx;
      s.title = '从这里播放';
      s.addEventListener('click', () => startFrom(tk.eventIdx));
      trackView.appendChild(s);
    }
  });
}

function highlightToken(evIdx){
  trackView.querySelectorAll('.tok.now').forEach(n => n.classList.remove('now'));
  const s = trackView.querySelector('.tok[data-event="' + evIdx + '"]');
  if (s){
    s.classList.add('now');
    const r = s.getBoundingClientRect(), box = trackView.getBoundingClientRect();
    if (r.top < box.top || r.bottom > box.bottom)
      s.scrollIntoView({block:'nearest', behavior:'smooth'});
  }
}

/* ============================ Scheduler ============================== */
/* Look-ahead scheduler: audio events queued 120 ms ahead on the audio
 * clock; a rAF loop drives visuals from the same timestamps.            */
const LOOKAHEAD_S = 0.12, TIMER_MS = 25;
let playing = false, pos = 0, nextTime = 0, timer = null;
let visQueue = [];   // {time, evIdx}
let stopAtTime = Infinity;

const bpmSlider  = document.getElementById('bpm');
const volSlider  = document.getElementById('vol');
const chkLoop    = document.getElementById('chkLoop');
const chkMetro   = document.getElementById('chkMetro');
const btnPlay    = document.getElementById('btnPlay');
const statusEl   = document.getElementById('status');
let eighthCount = 0;   // for metronome accents

function eighthDur(){ return 30 / Number(bpmSlider.value); }  // 60/bpm/2

function scheduler(){
  while (playing && nextTime < actx.currentTime + LOOKAHEAD_S){
    const ev = events[pos];
    for (const k of ev.keys) playHit(k, nextTime, 0.85);
    if (chkMetro.checked && eighthCount % 2 === 0)
      playTick(nextTime, eighthCount % 8 === 0);
    visQueue.push({time: nextTime, evIdx: pos});
    nextTime += eighthDur();
    eighthCount++;
    pos++;
    if (pos >= events.length){
      if (chkLoop.checked){ pos = 0; eighthCount = 0; }
      else { stopAtTime = nextTime; break; }
    }
  }
  if (playing && stopAtTime !== Infinity && actx.currentTime >= stopAtTime) stopPlay();
}

function visLoop(){
  if (!playing) return;
  const now = actx.currentTime;
  while (visQueue.length && visQueue[0].time <= now + 0.005){
    const v = visQueue.shift();
    const ev = events[v.evIdx];
    for (const k of ev.keys) flashPad(k);
    highlightToken(v.evIdx);
  }
  requestAnimationFrame(visLoop);
}

function startFrom(evIdx){
  if (events.length === 0){ statusEl.textContent = '乐谱为空，请先输入记号。'; return; }
  ensureCtx();
  stopPlay(true);
  playing = true;
  pos = Math.max(0, Math.min(evIdx, events.length - 1));
  eighthCount = 0;
  nextTime = actx.currentTime + 0.08;
  stopAtTime = Infinity;
  visQueue = [];
  timer = setInterval(scheduler, TIMER_MS);
  requestAnimationFrame(visLoop);
  btnPlay.textContent = '⏸ 暂停';
  statusEl.textContent = '播放中 · ' + bpmSlider.value + ' BPM';
}

function stopPlay(silent){
  playing = false;
  if (timer){ clearInterval(timer); timer = null; }
  visQueue = [];
  stopAtTime = Infinity;
  btnPlay.textContent = '▶ 播放';
  trackView.querySelectorAll('.tok.now').forEach(n => n.classList.remove('now'));
  if (!silent) statusEl.textContent = '已停止';
}

/* ============================ Wire up UI ============================= */
btnPlay.addEventListener('click', () => {
  if (playing) stopPlay();
  else startFrom(0);
});
document.getElementById('btnStop').addEventListener('click', () => stopPlay());

bpmSlider.addEventListener('input', () => {
  document.getElementById('bpmVal').textContent = bpmSlider.value;
  if (playing) statusEl.textContent = '播放中 · ' + bpmSlider.value + ' BPM';
});
volSlider.addEventListener('input', () => {
  document.getElementById('volVal').textContent = volSlider.value + '%';
  if (master) master.gain.value = volSlider.value / 100 * 0.85;
});

const scoreText = document.getElementById('scoreText');
document.getElementById('btnApply').addEventListener('click', () => {
  stopPlay(true);
  parseScore(scoreText.value);
  statusEl.textContent = '乐谱已应用：共 ' + events.length + ' 个八分音符。';
});
document.getElementById('btnReset').addEventListener('click', () => {
  stopPlay(true);
  scoreText.value = DEFAULT_SCORE;
  parseScore(DEFAULT_SCORE);
  statusEl.textContent = '已恢复 Pocket Groove 11。';
});

/* Space bar toggles playback when not typing in the textarea */
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement !== scoreText &&
      document.activeElement.tagName !== 'BUTTON'){
    e.preventDefault();
    playing ? stopPlay() : startFrom(0);
  }
});

/* ------------------------------ Init -------------------------------- */
scoreText.value = DEFAULT_SCORE;
parseScore(DEFAULT_SCORE);
</script>
</body>
</html>
