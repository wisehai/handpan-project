<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WisePan</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0f1317">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="悟碟">
<script>
  if ('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js', {updateViaCache: 'none'}).then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            // controller already set = this is an update, not the first-ever install
            if (nw.state === 'installed' && navigator.serviceWorker.controller){
              const b = document.getElementById('updateBanner');
              if (b) b.hidden = false;
            }
          });
        });
      }).catch(() => {});
    });
  }
</script>
<style>
  /* ---------- Design tokens: nitrided-steel handpan palette ---------- */
  :root{
    --bg:        #0f1317;
    --panel:     #171d23;
    --panel-2:   #1c242c;
    --line:      #2a343e;
    --pad:       #e9e6df;
    --pad-dim:   #b9bcb9;
    --ink:       #e8e4dc;
    --muted:     #8b96a0;
    --brass:     #d8a45c;   /* right hand — warm brass  */
    --brass-dp:  #a97b3d;
    --lblue:     #8fc7e8;   /* left hand — cool steel   */
    --ding:      #c9d4dd;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;}
  body{min-height:100vh;
    padding:calc(28px + env(safe-area-inset-top, 0px))
      calc(20px + env(safe-area-inset-right, 0px))
      calc(60px + env(safe-area-inset-bottom, 0px))
      calc(20px + env(safe-area-inset-left, 0px));}

  .wrap{max-width:1100px;margin:0 auto;}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px;}
  h1{font-size:26px;font-weight:600;letter-spacing:.04em;}
  h1 em{font-style:normal;color:var(--brass);}
  .sub{color:var(--muted);font-size:13px;letter-spacing:.06em;}
  .scale-tag{margin-left:auto;font-size:12px;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:4px 12px;}

  .grid{display:grid;grid-template-columns:minmax(340px,1fr) minmax(330px,440px);
    gap:22px;margin-top:18px;align-items:start;}
  @media (max-width:860px){.grid{grid-template-columns:1fr;}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;}
  .card h2{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.18em;
    text-transform:uppercase;margin-bottom:12px;}

  /* ---------- Pan ---------- */
  #panBox{display:flex;justify-content:center;}
  svg{max-width:520px;width:100%;height:auto;display:block;touch-action:none;}
  .pad-circle{cursor:pointer;transition:filter .12s;}
  .pad-circle:hover{filter:brightness(1.12);}
  .pad-label{font-size:19px;font-weight:600;fill:#333c44;pointer-events:none;}
  .pad-num{font-size:12px;fill:#77828c;pointer-events:none;}
  .hit-R .pad-fill{fill:var(--brass);}
  .hit-L .pad-fill{fill:var(--lblue);}
  .hit-R .pad-label,.hit-R .pad-num,
  .hit-L .pad-label,.hit-L .pad-num{fill:#20160a;}
  #tRing{cursor:pointer;transition:stroke .12s;}
  #tRing:hover{stroke:#5b6a77;}
  #tRing.hit-R{stroke:var(--brass);}
  #tRing.hit-L{stroke:var(--lblue);}
  #shell{cursor:pointer;transition:filter .1s;}
  #shell.slap{filter:brightness(1.35);}
  .ripple{fill:none;stroke-width:2.5;pointer-events:none;
    animation:rip .55s ease-out forwards;}
  @keyframes rip{from{opacity:.85;transform:scale(1);}to{opacity:0;transform:scale(1.8);}}
  @media (prefers-reduced-motion:reduce){.ripple{animation:none;opacity:0;}}
  .legend{display:flex;gap:16px;justify-content:center;font-size:12px;color:var(--muted);
    margin-top:10px;}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;
    vertical-align:-1px;}

  /* ---------- Transport ---------- */
  .transport{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;}
  button{font:inherit;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    border-radius:9px;padding:9px 16px;cursor:pointer;letter-spacing:.03em;}
  button:hover{border-color:var(--brass-dp);}
  button:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
  button.primary{background:var(--brass);border-color:var(--brass);color:#20160a;font-weight:600;
    min-width:96px;}
  button.primary:hover{background:#e4b26c;}
  label.chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
    cursor:pointer;user-select:none;}
  input[type=checkbox]{accent-color:var(--brass);width:15px;height:15px;}

  .sliders{margin-top:14px;display:grid;gap:12px;}
  .slider-row{display:grid;grid-template-columns:88px 1fr 62px;align-items:center;gap:10px;
    font-size:13px;color:var(--muted);}
  .slider-row output{color:var(--ink);font-variant-numeric:tabular-nums;text-align:right;}
  input[type=range]{width:100%;accent-color:var(--brass);height:4px;cursor:pointer;}

  /* ---------- Score ---------- */
  textarea{width:100%;min-height:200px;resize:vertical;background:#12171c;color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13px;line-height:1.7;
    font-family:"SF Mono",Consolas,Menlo,monospace;white-space:pre;}
  textarea:focus-visible{outline:2px solid var(--brass);outline-offset:1px;}
  .score-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
  select{font:inherit;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:9px;padding:8px 10px;max-width:190px;cursor:pointer;}
  .hint{font-size:12px;color:var(--muted);line-height:1.9;margin-top:10px;}
  .hint code{background:var(--panel-2);border:1px solid var(--line);border-radius:4px;
    padding:0 5px;color:var(--brass);font-family:Consolas,Menlo,monospace;}

  #trackView{margin-top:14px;background:#12171c;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;max-height:230px;overflow-y:auto;
    font-family:"SF Mono",Consolas,Menlo,monospace;font-size:12.5px;}
  .vlabel{display:block;color:var(--muted);font-size:11px;letter-spacing:.14em;
    margin:8px 0 3px;}
  .block{line-height:1;}
  .col{display:inline-flex;flex-direction:column;align-items:center;gap:2px;
    border-radius:6px;padding:2px 1px;margin:2px 1px;cursor:pointer;vertical-align:middle;}
  .col:hover{background:var(--panel-2);}
  .col.now{background:var(--brass);}
  .col.now .cell{color:#20160a !important;}
  .cell{min-width:22px;text-align:center;line-height:1.5;color:var(--pad-dim);}
  .cell.rest{color:#49545d;}
  .cell.ding{color:var(--ding);font-weight:600;}
  .barcol{display:inline-block;width:1px;height:26px;background:var(--line);
    vertical-align:middle;margin:0 6px;}
  .rowtag{display:inline-flex;flex-direction:column;gap:2px;margin-right:5px;
    vertical-align:middle;}
  .rowtag span{font-size:10px;line-height:1.5;text-align:center;}
  .rowtag .r{color:var(--brass);}
  .rowtag .l{color:var(--lblue);}
  .status{font-size:12px;color:var(--muted);margin-top:8px;min-height:16px;}
  .status.warn{color:#e0b45f;}

  /* ---------- Lang toggle / collapsible editor / library icons -------- */
  .lang{padding:5px 12px;border-radius:999px;font-size:12px;}
  #editWrap{margin-top:10px;}
  #editWrap summary{cursor:pointer;color:var(--muted);font-size:13px;letter-spacing:.05em;
    padding:4px 0;user-select:none;}
  #editWrap summary:hover{color:var(--ink);}
  #editWrap[open] summary{margin-bottom:8px;}
  button.icon{padding:9px 12px;min-width:42px;text-align:center;}
  button.icon.armed{background:#7e3a3a;border-color:#a04848;color:#ffd9d9;}
  button.icon:disabled{opacity:.35;cursor:default;}
  input[type=text]{font:inherit;background:#12171c;color:var(--ink);border:1px solid var(--line);
    border-radius:9px;padding:8px 10px;flex:1;min-width:120px;}
  input[type=text]:focus-visible{outline:2px solid var(--brass);outline-offset:1px;}
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:14px;padding:20px;min-width:min(320px,86vw);
    margin-top:8vh;margin-right:auto;margin-bottom:auto;margin-left:auto;}
  dialog::backdrop{background:rgba(6,9,12,.6);backdrop-filter:blur(2px);}
  dialog h3{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.16em;
    text-transform:uppercase;margin-bottom:12px;}
  dialog input[type=text]{width:100%;}
  .dlg-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
  .update-banner{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom, 0px));
    transform:translateX(-50%);z-index:20;
    background:var(--panel);color:var(--ink);border:1px solid var(--brass);border-radius:999px;
    padding:9px 18px;font-size:13px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.35);}
  .update-banner:hover{border-color:var(--ink);}

  /* ---------- Immersive mode ---------- */
  .immersive-toggle{position:fixed;top:calc(14px + env(safe-area-inset-top, 0px));
    right:calc(14px + env(safe-area-inset-right, 0px));z-index:20;padding:5px 12px;
    border-radius:999px;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,.35);}
  body.immersive header,
  body.immersive .legend,
  body.immersive .transport,
  body.immersive .sliders,
  body.immersive #status,
  body.immersive .card h2,
  body.immersive #libRow,
  body.immersive #editWrap{display:none;}
  body.immersive .grid{grid-template-columns:1fr;gap:10px;
    margin-top:calc(56px + env(safe-area-inset-top, 0px));}
  body.immersive .card{padding:10px;}
</style>
</head>
<body>
<button id="updateBanner" class="update-banner" data-i18n="updateReady" hidden>New version available — tap to refresh</button>
<button id="btnImmersive" class="immersive-toggle" data-i18n="immersive">⛶ Focus</button>
<div class="wrap">
  <header>
    <h1 data-i18n="title">Wise <em>Pan</em></h1>
    <span class="sub" data-i18n="subtitle">Your practice partner</span>
    <button id="langBtn" class="lang" aria-label="Switch language / 切换语言">中</button>
  </header>

  <div class="grid">
    <!-- ================= Left: pan + transport ================= -->
    <div class="card">
      <h2 data-i18n="panTitle">Handpan · tap a pad / T ring / shell to preview</h2>
      <div id="panBox">
        <svg id="pan" viewBox="0 0 500 500" role="img" data-i18n-aria="ariaPan" aria-label="Handpan layout"></svg>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--brass)"></span><span data-i18n="legendR">Right hand R</span></span>
        <span><span class="dot" style="background:var(--lblue)"></span><span data-i18n="legendL">Left hand L</span></span>
        <span data-i18n="legendT">T = shoulder (ring around Ding)</span>
        <span data-i18n="legendS">S = slap (shell)</span>
      </div>

      <div class="transport">
        <button class="primary" id="btnPlay" data-i18n="play">▶ Play</button>
        <label class="chk"><input type="checkbox" id="chkLoop"><span data-i18n="loop">Loop</span></label>
        <label class="chk"><input type="checkbox" id="chkMetro"><span data-i18n="metro">Metronome</span></label>
      </div>

      <div class="sliders">
        <div class="slider-row">
          <span data-i18n="bpmLabel">Tempo BPM</span>
          <input type="range" id="bpm" min="50" max="200" value="110" step="1">
          <output id="bpmVal">110</output>
        </div>
        <div class="slider-row">
          <span data-i18n="volLabel">Volume</span>
          <input type="range" id="vol" min="0" max="100" value="75" step="1">
          <output id="volVal">75%</output>
        </div>
      </div>
      <div class="status" id="status"></div>
    </div>

    <!-- ================= Right: score ================= -->
    <div class="card">
      <h2 data-i18n="scoreTitle">Score</h2>
      <div class="score-actions" id="libRow">
        <select id="libSel" data-i18n-aria="libAria" aria-label="Score library"></select>
        <button id="btnLibSave" class="icon" data-i18n-title="saveTip" title="Save current score to library">＋</button>
        <button id="btnLibDel" class="icon" data-i18n-title="delTip" title="Delete selected score">✕</button>
        <button id="btnPdf" class="icon" data-i18n="pdfBtn" data-i18n-title="pdfTip" title="Import a PDF score">PDF</button>
      </div>
      <dialog id="saveDlg">
        <h3 data-i18n="saveTitle">Save to library</h3>
        <input type="text" id="saveName" maxlength="60" autocomplete="off"
               data-i18n-ph="savePh" placeholder="Score name">
        <div class="dlg-actions">
          <button id="btnSaveCancel" data-i18n="saveCancel">Cancel</button>
          <button id="btnSaveOk" class="primary" data-i18n="saveOk">Save</button>
        </div>
      </dialog>
      <details id="editWrap">
        <summary data-i18n="editScore">Edit score (two-row notation)</summary>
        <textarea id="scoreText" spellcheck="false" wrap="off"></textarea>
        <div class="score-actions">
          <button id="btnApply" data-i18n="apply">Apply</button>
        </div>
        <div class="hint" data-i18n="hint"></div>
      </details>
      <input type="file" id="pdfFile" accept="application/pdf" hidden>
      <div id="trackView"></div>
    </div>
  </div>
</div>

<script>
'use strict';
/* =====================================================================
 * Handpan player — D Kurd 8+1
 * Two-row (R/L hand) score, T shoulder tone, S slap,
 * Web Audio synthesis + SVG visualization
 * ===================================================================== */

/* ============================ i18n =================================== */

    legendR:    '右手 R',
    legendL:    '左手 L',
    legendT:    'T = 肩音（Ding 外圈）',
    legendS:    'S = Slap（碟面）',
    play:       '▶ 播放',
    pause:      '⏸ 暂停',
    loop:       '循环',
    metro:      '节拍器',
    bpmLabel:   '速度 BPM',
    volLabel:   '音量',
    scoreTitle: '乐谱',
    editScore:  '编辑乐谱（双行记法）',
    apply:      '应用乐谱',
    pdfBtn:     'PDF',
    pdfTip:     '导入 PDF 识谱',
    saveTitle:  '存入曲库',
    saveTip:    '把当前谱存入曲库',
    delTip:     '删除选中曲目',
    libAria:    '曲库',
    savePh:     '曲目名称',
    saveOk:     '保存',
    saveCancel: '取消',
    sure:       '确认?',
    builtinGroup: '内置',
    userGroup:  '我的曲子',
    hint: '记号：<code>D</code> Ding，<code>1</code>–<code>8</code> 音区，' +
          '<code>T</code> 肩音，<code>S</code> Slap，<code>.</code> 休止，' +
          '<code>|</code> 小节线（仅显示），<code>#</code> 注释行。' +

// Guarded localStorage: returns null in sandboxed previews / private mode.
function store(){
  try {
    localStorage.setItem('__probe', '1');
    localStorage.removeItem('__probe');
    return localStorage;
  } catch (e){ return null; }
}

function detectLang(){
  const saved = store() && store().getItem('handpan_lang');
  if (saved) return saved;
  const langs = navigator.languages || [navigator.language || ''];
  return langs.some(l => l && l.toLowerCase().startsWith('zh')) ? 'zh' : 'en';
}
let lang = detectLang();
let immersive = (store() && store().getItem('handpan_immersive')) === '1';

function tr(key, ...args){
  const v = (I18N[lang] && I18N[lang][key]) ?? I18N.en[key] ?? key;
  return (typeof v === 'function') ? v(...args) : v;
}

function safeConfirm(msg){
  try { return window.confirm(msg); } catch (e){ return true; }
}

/* ---------- Note table (name, frequency, ring angle from top, CW) ---- */
const NOTES = {
  'D': { name:'D3', freq:146.83, ding:true },
  'T': { name:'T',  freq:293.66, shoulder:true },  // measured: D4 attack (MIDI 62), D3 tail
  '1': { name:'A3',  freq:220.00, angle:180 },
  '2': { name:'Bb3', freq:233.08, angle:225 },
  '3': { name:'C4',  freq:261.63, angle:135 },
  '4': { name:'D4',  freq:293.66, angle:270 },
  '5': { name:'E4',  freq:329.63, angle: 90 },
  '6': { name:'F4',  freq:349.23, angle:315 },
  '7': { name:'G4',  freq:392.00, angle: 45 },
  '8': { name:'A4',  freq:440.00, angle:  0 },
};

/* ---------- Default score ---------------------------------------------
 * Pocket Groove 11, two-row R/L format. Hands follow the PDF row order
 * (upper row = R, lower row = L), recovered from the user's `X+Y` token
 * order (first = upper). Rows for isolated single notes are inferred
 * from pattern continuity and may need review.                          */

/* =========================== Build the SVG pan ======================= */
const SVG_NS = 'http://www.w3.org/2000/svg';
const pan = document.getElementById('pan');
const CX = 250, CY = 250, RING_R = 168, PAD_R = 40, DING_R = 50, T_R = 68;
const padEls = {};   // key -> {g, cx, cy, r, ring?}

function el(tag, attrs, parent){
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(n);
  return n;
}

function buildPan(){
  const defs = el('defs', {}, pan);
  const grad = el('radialGradient', {id:'shellg', cx:'38%', cy:'32%', r:'85%'}, defs);
  el('stop', {offset:'0%',  'stop-color':'#414e59'}, grad);
  el('stop', {offset:'55%', 'stop-color':'#2c3742'}, grad);
  el('stop', {offset:'100%','stop-color':'#1b232b'}, grad);
  const padGrad = el('radialGradient', {id:'padg', cx:'40%', cy:'35%', r:'80%'}, defs);
  el('stop', {offset:'0%',  'stop-color':'#f4f2ec'}, padGrad);
  el('stop', {offset:'100%','stop-color':'#d5d3ca'}, padGrad);

  // shell — clicking empty shell area previews a slap
  const shell = el('circle', {id:'shell', cx:CX, cy:CY, r:228, fill:'url(#shellg)',
    stroke:'#465360', 'stroke-width':2, tabindex:0, role:'button',
    'aria-label':tr('ariaSlap')}, pan);
  el('circle', {cx:CX, cy:CY, r:214, fill:'none', stroke:'#161d24',
    'stroke-width':1.5, opacity:.7, 'pointer-events':'none'}, pan);
  const slapTrig = e => { e.preventDefault(); ensureCtx(); playEventNow([{key:'S', hand:null}]); };
  shell.addEventListener('pointerdown', slapTrig);
  shell.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' '){e.preventDefault();slapTrig(e);} });

  // T shoulder ring around the ding
  const tRing = el('circle', {id:'tRing', cx:CX, cy:CY, r:T_R, fill:'none',
    stroke:'#4a5763', 'stroke-width':13, 'pointer-events':'stroke',
    tabindex:0, role:'button', 'aria-label':tr('ariaT')}, pan);
  el('text', {x:CX + (T_R+16)*Math.SQRT1_2, y:CY - (T_R+13)*Math.SQRT1_2,
    class:'pad-num', 'text-anchor':'middle', 'pointer-events':'none'}, pan)
    .textContent = 'T';
  const tTrig = e => { e.preventDefault(); ensureCtx(); playEventNow([{key:'T', hand:null}]); };
  tRing.addEventListener('pointerdown', tTrig);
  tRing.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' '){e.preventDefault();tTrig(e);} });
  padEls['T'] = {g:tRing, cx:CX, cy:CY, r:T_R, ring:true};
  padEls['S'] = {g:shell, cx:CX, cy:CY, r:228, shell:true};

  const makePad = (key, cx, cy, r) => {
    const g = el('g', {class:'pad-circle', tabindex:0, role:'button',
                       'aria-label':tr('ariaPad', key)}, pan);
    el('circle', {class:'pad-fill', cx, cy, r, fill:'url(#padg)',
                  stroke:'#10151a', 'stroke-width':2}, g);
    const n = NOTES[key];
    el('text', {class:'pad-label', x:cx, y:cy + (n.ding ? 0 : -2),
                'text-anchor':'middle', 'dominant-baseline':'middle'}, g)
      .textContent = n.name;
    el('text', {class:'pad-num', x:cx, y:cy + 18, 'text-anchor':'middle'}, g)
      .textContent = n.ding ? 'Ding' : key;
    const trigger = e => { e.preventDefault(); ensureCtx(); playEventNow([{key, hand:null}]); };
    g.addEventListener('pointerdown', trigger);
    g.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' '){e.preventDefault();trigger(e);} });
    padEls[key] = {g, cx, cy, r};
  };

  for (const key in NOTES){
    const n = NOTES[key];
    if (n.shoulder) continue;
    if (n.ding){ makePad(key, CX, CY, DING_R); continue; }
    const a = n.angle * Math.PI / 180;
    makePad(key, CX + RING_R * Math.sin(a), CY - RING_R * Math.cos(a), PAD_R);
  }
}
buildPan();

/* ------------------------- Visual strike ----------------------------- */
function handColor(hand){ return hand === 'L' ? '#8fc7e8' : '#d8a45c'; }

function flashPad(key, hand){
  const p = padEls[key];
  if (!p) return;
  if (p.shell){                       // slap: pulse the shell
    p.g.classList.add('slap');
    setTimeout(() => p.g.classList.remove('slap'), 120);
    const rp = el('circle', {class:'ripple', cx:p.cx, cy:p.cy, r:200,
      stroke:handColor(hand),
      style:'transform-origin:'+p.cx+'px '+p.cy+'px; animation-duration:.35s'}, pan);
    setTimeout(() => rp.remove(), 400);
    return;
  }
  const cls = hand === 'L' ? 'hit-L' : 'hit-R';
  p.g.classList.add(cls);
  setTimeout(() => p.g.classList.remove(cls), 140);
  const rp = el('circle', {class:'ripple', cx:p.cx, cy:p.cy, r:p.r,
    stroke:handColor(hand),
    style:'transform-origin:' + p.cx + 'px ' + p.cy + 'px'}, pan);
  setTimeout(() => rp.remove(), 600);
}

/* ============================ Audio engine =========================== */
let actx = null, master = null;

function ensureCtx(){
  if (!actx){
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain();
    master.gain.value = volSlider.value / 100 * 0.85;
    const comp = actx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.ratio.value = 4;
    master.connect(comp); comp.connect(actx.destination);
    unlockIosSilentSwitch();
  }
  if (actx.state === 'suspended') actx.resume();
}

// iOS Safari mutes Web Audio API output when the phone's physical mute switch
// is on, *unless* a native <audio>/<video> element has played at least once —
// that flips the page's audio session into the "playback" category, which
// ignores the switch. Playing a near-silent clip here, inside the same
// user-gesture call stack that creates the AudioContext, unlocks it for all
// subsequent Web Audio output.
function unlockIosSilentSwitch(){
  const a = new Audio('data:audio/wav;base64,UklGRkQDAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YSADAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==');
  a.play().catch(() => {});
}

/* Tone field / ding: fundamental + octave + compound fifth partials.
 * Shoulder (T): brighter, fewer lows, faster decay.
 * Slap (S): unpitched — body thump + band-passed noise crack.           */
function playHit(key, t, vel){
  if (key === 'S'){ playSlap(t, vel); return; }
  const note = NOTES[key];
  if (!note) return;

  let dur, partials, noiseF, noiseAmp;
  if (note.shoulder){
    // measured: strong D4 attack (MIDI 62) decaying into a faint D3 tail (MIDI 50)
    dur = 1.8;
    partials = [[1, 1.0], [1.5, 0.22], [2, 0.10], [0.5, 0.30]];
    noiseF = note.freq * 3; noiseAmp = 0.30;
  } else {
    dur = note.ding ? 3.0 : 2.1;
    partials = [[1, 1.0], [2, 0.55], [3, 0.22], [4.16, 0.05]];
    noiseF = note.freq * 2.5; noiseAmp = 0.35;
  }

  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.5 * vel, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  g.connect(master);

  for (const [mult, amp] of partials){
    const o = actx.createOscillator();
    o.type = 'sine';
    o.frequency.value = note.freq * mult;
    o.detune.value = (Math.random() * 6) - 3;
    const og = actx.createGain();
    og.gain.value = amp;
    o.connect(og); og.connect(g);
    o.start(t); o.stop(t + dur + 0.1);
  }

  // attack transient: 30 ms band-passed noise burst
  const nLen = Math.floor(actx.sampleRate * 0.03);
  const buf = actx.createBuffer(1, nLen, actx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < nLen; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / nLen);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = noiseF; bp.Q.value = 1.2;
  const ng = actx.createGain(); ng.gain.value = noiseAmp * vel;
  src.connect(bp); bp.connect(ng); ng.connect(g);
  src.start(t);
}

function playSlap(t, vel){
  // low body thump with a fast downward pitch sweep
  const o = actx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(210, t);
  o.frequency.exponentialRampToValueAtTime(85, t + 0.09);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.55 * vel, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.18);

  // noise crack, low-passed for a fleshy palm sound
  const nLen = Math.floor(actx.sampleRate * 0.06);
  const buf = actx.createBuffer(1, nLen, actx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < nLen; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / nLen, 2);
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 1400; lp.Q.value = 0.8;
  const ng = actx.createGain(); ng.gain.value = 0.6 * vel;
  src.connect(lp); ng.connect(master); lp.connect(ng);
  src.start(t);
}

function playTick(t, strong){
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'square'; o.frequency.value = strong ? 1600 : 1100;
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.05);
}

function playEventNow(hits){
  for (const h of hits){ playHit(h.key, actx.currentTime, 0.9); flashPad(h.key, h.hand); }
}

/* ============================ Score parsing =========================== */
/* events: [{hits:[{key,hand}]}]  — each event = one eighth note.
 * blocks: display structure — {label} or {cols:[...], single:bool}
 * col: {bar:true} or {evIdx, rT, lT}                                     */
let events = [], blocks = [], parseWarnings = [];

function tokenize(s){
  // Normalize glued tokens: ".|" -> ". |", "T." -> "T .", "1+4." -> "1+4 ."
  return s.replace(/\|/g, ' | ')
          .replace(/([DTSdts1-8+])\.(?!\S)/g, '$1 .')
          .trim().split(/\s+/).filter(Boolean);
}

function isValidKey(k){ return k === 'S' || !!NOTES[k]; }

function makeEventCol(rT, lT, neutral){
  const hits = [];
  const add = (tok, hand) => {
    if (!tok || tok === '.' ) return;
    for (const kRaw of tok.split('+')){
      const k = kRaw.toUpperCase();
      if (isValidKey(k)) hits.push({key:k, hand});
    }
  };
  add(rT, neutral ? null : 'R'); add(lT, 'L');
  const evIdx = events.length;
  events.push({hits});
  return {evIdx, rT: rT || '', lT: lT || ''};
}

function buildBlock(rToks, lToks, legacy){
  const rEv = rToks ? rToks.filter(t => t !== '|') : null;
  const lEv = lToks ? lToks.filter(t => t !== '|') : null;
  const nR = rEv ? rEv.length : 0, nL = lEv ? lEv.length : 0;
  if (rEv && lEv && nR !== nL)
    parseWarnings.push(tr('rlMismatch', nR, nL));
  const n = Math.max(nR, nL);
  const guide = rToks || lToks;          // bar positions taken from this row
  const cols = [];
  let p = 0;
  for (const t of guide){
    if (t === '|'){ cols.push({bar:true}); continue; }
    cols.push(makeEventCol(rEv ? rEv[p] : null, lEv ? lEv[p] : null, legacy));
    p++;
  }
  while (p < n){ cols.push(makeEventCol(rEv ? rEv[p] : null, lEv ? lEv[p] : null, legacy)); p++; }
  return {cols, single: !(rToks && lToks), legacy: !!legacy};
}

function parseScore(text){
  events = []; blocks = []; parseWarnings = [];
  const lines = text.split('\n').map(l => l.trim());
  let i = 0;
  while (i < lines.length){
    const line = lines[i];
    if (!line){ i++; continue; }
    if (line.startsWith('#')){
      blocks.push({label: line.replace(/^#\s*/, '')});
      i++; continue;
    }
    const mR = line.match(/^R\s*[:|]\s*(.*)$/i);
    const mL = line.match(/^L\s*[:|]\s*(.*)$/i);
    if (mR){
      let j = i + 1;
      while (j < lines.length && !lines[j]) j++;
      const mL2 = (j < lines.length) ? lines[j].match(/^L\s*[:|]\s*(.*)$/i) : null;
      if (mL2){ blocks.push(buildBlock(tokenize(mR[1]), tokenize(mL2[1]))); i = j + 1; }
      else    { blocks.push(buildBlock(tokenize(mR[1]), null)); i++; }
    } else if (mL){
      blocks.push(buildBlock(null, tokenize(mL[1]))); i++;
    } else {
      blocks.push(buildBlock(tokenize(line), null, true)); i++;   // legacy single line
    }
  }
  renderTrack();
}

/* --------------------------- Track display --------------------------- */
const trackView = document.getElementById('trackView');

function renderTrack(){
  trackView.innerHTML = '';
  for (const b of blocks){
    if (b.label !== undefined){
      const s = document.createElement('span');
      s.className = 'vlabel'; s.textContent = b.label;
      trackView.appendChild(s);
      continue;
    }
    const div = document.createElement('div');
    div.className = 'block';
    if (!b.single){
      const tag = document.createElement('span');
      tag.className = 'rowtag';
      tag.innerHTML = '<span class="r">R</span><span class="l">L</span>';
      div.appendChild(tag);
    }
    for (const c of b.cols){
      if (c.bar){
        const s = document.createElement('span');
        s.className = 'barcol';
        div.appendChild(s);
        continue;
      }
      const col = document.createElement('span');
      col.className = 'col';
      col.dataset.event = c.evIdx;
      col.title = tr('playFromHere');
      const mk = (txt) => {
        const s = document.createElement('span');
        const t = (txt || '.');
        s.className = 'cell' + (t === '.' ? ' rest' : '') +
                      (/D/i.test(t) ? ' ding' : '');
        s.textContent = t === '.' ? '·' : t;
        return s;
      };
      col.appendChild(mk(b.single ? (c.rT || c.lT) : c.rT));
      if (!b.single) col.appendChild(mk(c.lT));
      col.addEventListener('click', () => startFrom(c.evIdx));
      div.appendChild(col);
    }
    trackView.appendChild(div);
  }
}

function highlightToken(evIdx){
  trackView.querySelectorAll('.col.now').forEach(n => n.classList.remove('now'));
  const s = trackView.querySelector('.col[data-event="' + evIdx + '"]');
  if (s){
    s.classList.add('now');
    // Scroll only trackView's own box, never scrollIntoView — that walks every
    // scrollable ancestor including the page, which fights a user's manual
    // scroll on mobile (page keeps snapping back to the score on every tick).
    const r = s.getBoundingClientRect(), box = trackView.getBoundingClientRect();
    if (r.top < box.top) trackView.scrollBy({top: r.top - box.top, behavior: 'smooth'});
    else if (r.bottom > box.bottom) trackView.scrollBy({top: r.bottom - box.bottom, behavior: 'smooth'});
  }
}

/* ============================ Scheduler ============================== */
const LOOKAHEAD_S = 0.12, TIMER_MS = 25;
let playing = false, pos = 0, nextTime = 0, timer = null;
let visQueue = [];
let stopAtTime = Infinity;
let eighthCount = 0;

const bpmSlider  = document.getElementById('bpm');
const volSlider  = document.getElementById('vol');
const chkLoop    = document.getElementById('chkLoop');
const chkMetro   = document.getElementById('chkMetro');
const btnPlay    = document.getElementById('btnPlay');
const statusEl   = document.getElementById('status');

function eighthDur(){ return 30 / Number(bpmSlider.value); }   // 60/bpm/2

function scheduler(){
  while (playing && pos < events.length && nextTime < actx.currentTime + LOOKAHEAD_S){
    const ev = events[pos];
    for (const h of ev.hits) playHit(h.key, nextTime, 0.85);
    if (chkMetro.checked && eighthCount % 2 === 0)
      playTick(nextTime, eighthCount % 8 === 0);
    visQueue.push({time: nextTime, evIdx: pos});
    nextTime += eighthDur();
    eighthCount++;
    pos++;
    if (pos >= events.length){
      if (chkLoop.checked){ pos = 0; eighthCount = 0; }
      else { stopAtTime = nextTime; break; }
    }
  }
  if (playing && stopAtTime !== Infinity && actx.currentTime >= stopAtTime) stopPlay();
}

function visLoop(){
  if (!playing) return;
  const now = actx.currentTime;
  while (visQueue.length && visQueue[0].time <= now + 0.005){
    const v = visQueue.shift();
    for (const h of events[v.evIdx].hits) flashPad(h.key, h.hand);
    highlightToken(v.evIdx);
  }
  requestAnimationFrame(visLoop);
}

function startFrom(evIdx){
  if (events.length === 0){ statusEl.textContent = tr('emptyScore'); return; }
  ensureCtx();
  stopPlay(true);
  playing = true;
  pos = Math.max(0, Math.min(evIdx, events.length - 1));
  eighthCount = 0;
  nextTime = actx.currentTime + 0.08;
  stopAtTime = Infinity;
  visQueue = [];
  timer = setInterval(scheduler, TIMER_MS);
  requestAnimationFrame(visLoop);
  btnPlay.textContent = tr('pause');
  statusEl.className = 'status';
  statusEl.textContent = tr('playingAt', bpmSlider.value);
}

function stopPlay(silent){
  playing = false;
  if (timer){ clearInterval(timer); timer = null; }
  visQueue = [];
  stopAtTime = Infinity;
  if (pos >= events.length) pos = 0;   // finished naturally -> next Play starts over
  btnPlay.textContent = tr('play');
  trackView.querySelectorAll('.col.now').forEach(n => n.classList.remove('now'));
  if (!silent){ statusEl.className = 'status'; statusEl.textContent = tr('stopped'); }
}

/* ============================ Wire up UI ============================= */
btnPlay.addEventListener('click', () => { playing ? stopPlay() : startFrom(pos); });

bpmSlider.addEventListener('input', () => {
  document.getElementById('bpmVal').textContent = bpmSlider.value;
  if (playing) statusEl.textContent = tr('playingAt', bpmSlider.value);
});
volSlider.addEventListener('input', () => {
  document.getElementById('volVal').textContent = volSlider.value + '%';
  if (master) master.gain.value = volSlider.value / 100 * 0.85;
});

const scoreText = document.getElementById('scoreText');
function applyScore(msg){
  stopPlay(true);
  parseScore(scoreText.value);
  pos = 0;   // old resume position no longer maps to the freshly parsed score
  if (parseWarnings.length){
    statusEl.className = 'status warn';
    statusEl.textContent = '⚠ ' + parseWarnings.join('; ');
  } else {
    statusEl.className = 'status';
    statusEl.textContent = (msg ? msg + ' · ' : '') + tr('slotCount', events.length);
  }
}
document.getElementById('btnApply').addEventListener('click', () => applyScore());

/* ==================== PDF score recognition ========================== */
/* Notepan-style vector PDFs carry a text layer where every note label
 * (D / T / S / 1-8) is a glyph with (x, y) coordinates. Recognition is
 * pure geometry — no ML involved:
 *   1. keep single-char note tokens, cluster them into rows by y
 *   2. rows with >= MIN_ROW_TOKENS items are score rows; junk (titles,
 *      measure numbers, layout-page labels) falls below the threshold
 *   3. two adjacent rows = one system: upper row -> R, lower row -> L
 *   4. quantize x onto the 8th-note grid (grid step = smallest x gap);
 *      empty slots become rests
 * Fails only on scanned/rasterized PDFs, which have no text layer.      */
const PDFJS_URL    = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const TOKEN_RE = /^(D|T|S|[1-8])$/i;   // case-insensitive: some glyph variants render lowercase
const MIN_ROW_TOKENS = 3;   // rows with fewer tokens are treated as junk
const ROW_Y_TOL = 4;        // y tolerance when clustering tokens into a row
const SYSTEM_GAP = 45;      // max y gap between the R and L rows of one system

function loadPdfJs(){
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = PDFJS_URL;
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
      res(window.pdfjsLib);
    };
    s.onerror = () => rej(new Error(tr('pdfJsFail')));
    document.head.appendChild(s);
  });
}

function clusterRows(items){
  const rows = [];
  for (const it of items.slice().sort((a, b) => a.y - b.y)){   // top of page first (viewport y grows downward)
    const r = rows.find(r => Math.abs(r.y - it.y) <= ROW_Y_TOL);
    if (r) r.items.push(it); else rows.push({y: it.y, items: [it]});
  }
  return rows;   // junk filtering happens in recognizePdf, once noteMinX is known
}

// Fallback for systems too sparse to quantize into columns (0-1 real columns):
// still keep the R:/L: split when both hands are present, same as the normal path.
function sparseFallback(top, bottom, all){
  if (top && bottom) return ['R: ' + top.items.map(i => i.str).join(' '),
                             'L: ' + bottom.items.map(i => i.str).join(' ')];
  return [all.map(i => i.str).join(' ')];
}

/* Column quantization: cluster raw x's into columns first (tolerant of the
 * sub-pixel glyph-origin jitter between different characters landing in the
 * same musical slot, e.g. 'D' vs '4' at a simultaneous hit), then walk
 * columns incrementally — each column's slot index is the previous column's
 * plus round(localGap / step) — instead of round((x - x0) / step) from one
 * fixed origin. The latter compounds a few % of step error linearly over a
 * row's length and silently drifts a whole slot by column ~15-20; the
 * incremental form only ever rounds a small local ratio, so it doesn't.
 *
 * `fallbackStep` is the most recently, reliably-derived step from an earlier
 * system in this document (or null). A system with only 2 columns has just
 * one gap to go on, which can't tell "adjacent" from "several slots apart" —
 * every system in a document shares essentially the same pixel-per-8th-note
 * step, so falling back to a known-good one beats guessing from a single
 * ambiguous gap. `isLastSystem` suppresses the trailing-rest recovery below:
 * that assumes a system is followed by more content, which isn't true for the
 * very last system of the whole piece. Returns {lines, step} — step is the
 * one actually used, for the caller to carry forward as the next fallback. */
function systemToLines(top, bottom, fallbackStep, isLastSystem){
  const all = [...(top ? top.items : []), ...(bottom ? bottom.items : [])];
  if (all.length < 2) return {lines: sparseFallback(top, bottom, all), step: null};
  const COL_TOL = 6;
  const sortedX = all.map(it => it.x).sort((a, b) => a - b);
  const cols = [];
  for (const x of sortedX){
    const c = cols[cols.length - 1];
    if (c && x - c.x < COL_TOL) c.x = (c.x * c.n + x) / ++c.n;
    else cols.push({x, n: 1});
  }
  if (cols.length < 2) return {lines: sparseFallback(top, bottom, all), step: null};
  const gaps = [];
  for (let i = 1; i < cols.length; i++) gaps.push(cols[i].x - cols[i-1].x);
  let step, usedFallback = false;
  if (cols.length >= 3){
    const minGap = Math.min(...gaps);
    const unitGaps = gaps.filter(g => g <= minGap * 1.5).sort((a, b) => a - b);
    step = unitGaps[Math.floor(unitGaps.length / 2)];   // median of the smallest-gap cluster
  } else if (fallbackStep){
    step = fallbackStep;
    usedFallback = true;
  } else {
    step = gaps[0];   // no other reference anywhere yet — best guess available
  }
  if (!isFinite(step) || step <= 0) return {lines: [], step: null};
  const colSlot = [0];
  for (let i = 1; i < cols.length; i++)
    colSlot.push(colSlot[i - 1] + Math.max(1, Math.round(gaps[i - 1] / step)));
  // one past the last visible glyph; if that's odd, the phrase almost certainly
  // ends on an invisible trailing rest (this style's phrases end on even slots)
  // — unless this is the very last system in the piece, which just ends here.
  let nSlots = colSlot[colSlot.length - 1] + 1;
  if (!isLastSystem && nSlots % 2 === 1) nSlots++;
  if (nSlots > 256) return {lines: [], step: null};
  const slotOf = x => {
    let lo = 0, hi = cols.length - 1;
    while (lo < hi){
      const mid = (lo + hi) >> 1;
      if (cols[mid].x < x) lo = mid + 1; else hi = mid;
    }
    if (lo > 0 && Math.abs(cols[lo - 1].x - x) < Math.abs(cols[lo].x - x)) lo--;
    return colSlot[lo];
  };
  const toRow = row => {
    const arr = Array(nSlots).fill('.');
    if (row) for (const it of row.items){
      const s = slotOf(it.x);
      arr[s] = (arr[s] === '.') ? it.str : arr[s] + '+' + it.str;
    }
    // barline every 8 slots for readability (assumes 4/4, cosmetic only)
    return arr.flatMap((t, i) => (i > 0 && i % 8 === 0) ? ['|', t] : [t]).join(' ');
  };
  const lines = (top && bottom) ? ['R: ' + toRow(top), 'L: ' + toRow(bottom)]
                                 : [toRow(top || bottom)];
  return {lines, step: usedFallback ? null : step};
}

// Group y-clustered rows into systems. Usually a system is just 2 rows (R
// above L), but when a hand hits two pads at once, Notepan renders the second
// note of that chord on its own sparse row, offset by the same ~16pt gap used
// between R and L in general — indistinguishable from a real 3rd hand row by
// y-gap alone. Chain rows within SYSTEM_GAP of each other; for a chain of 3+,
// the 2 densest rows are the real hands (a hand's row has one entry per note
// it ever plays, so it's never sparser than its own chord-helper), and any
// other row is a helper merged into whichever hand row it sits closer to —
// its items land at x's already present in that row, so systemToLines's
// existing column clustering folds them into a '+' chord automatically.
function groupSystems(rows){
  const chains = [];
  for (const r of rows){
    const last = chains[chains.length - 1];
    if (last && r.y - last[last.length - 1].y <= SYSTEM_GAP) last.push(r);
    else chains.push([r]);
  }
  return chains.map(chain => {
    if (chain.length <= 2) return {top: chain[0], bottom: chain[1] || null};
    const [top, bottom] = chain.slice().sort((a, b) => b.items.length - a.items.length)
                                .slice(0, 2).sort((a, b) => a.y - b.y);
    for (const r of chain){
      if (r === top || r === bottom) continue;
      const target = Math.abs(r.y - top.y) <= Math.abs(r.y - bottom.y) ? top : bottom;
      target.items.push(...r.items);
    }
    return {top, bottom};
  });
}

async function recognizePdf(file){
  const lib = await loadPdfJs();
  const doc = await lib.getDocument({data: await file.arrayBuffer()}).promise;
  // Collect every system up front (across all pages) before emitting any output — this is what
  // lets us know which system is the document's last one, and lets step estimates carry forward
  // from earlier, denser systems to later, sparser ones (see systemToLines).
  const allSystems = [];   // {page, top, bottom}
  for (let p = 1; p <= doc.numPages; p++){
    const page = await doc.getPage(p);
    const viewport = page.getViewport({scale: 1});   // accounts for the page's /Rotate entry
    const tc = await page.getTextContent();
    const items = tc.items
      .map(it => {
        const tx = lib.Util.transform(viewport.transform, it.transform);
        return {str: it.str.trim().toUpperCase(), x: tx[4], y: tx[5]};
      })
      .filter(it => TOKEN_RE.test(it.str));
    const rows = clusterRows(items);
    // A row below MIN_ROW_TOKENS is normally junk (page-number stamps, the pad-diagram
    // labels scattered around the cover page's circle) — but a short *real* final
    // phrase (e.g. a single closing note) is just as sparse. Junk margin labels sit at
    // x well left of the real note grid, so use the leftmost x seen among rows that
    // already qualify on their own as the cutoff for rescuing sparse-but-real rows.
    const noteMinX = Math.min(...rows.filter(r => r.items.length >= MIN_ROW_TOKENS)
                                      .flatMap(r => r.items.map(it => it.x)));
    const realRows = rows.filter(r => r.items.length >= MIN_ROW_TOKENS ||
      (isFinite(noteMinX) && r.items.every(it => it.x >= noteMinX)));
    for (const {top, bottom} of groupSystems(realRows)) allSystems.push({page: p, top, bottom});
  }
  if (!allSystems.length)
    throw new Error(tr('pdfNoScore'));
  const out = [tr('pdfHeader', file.name)];
  let pageMarked = null, fallbackStep = null;
  allSystems.forEach(({page, top, bottom}, idx) => {
    const {lines, step} = systemToLines(top, bottom, fallbackStep, idx === allSystems.length - 1);
    if (step) fallbackStep = step;
    if (lines.length){
      if (pageMarked !== page){ out.push(tr('pdfPage', page)); pageMarked = page; }
      out.push(...lines, '');
    }
  });
  return out.join('\n');
}

const pdfFile = document.getElementById('pdfFile');
document.getElementById('btnPdf').addEventListener('click', () => pdfFile.click());
pdfFile.addEventListener('change', async () => {
  const f = pdfFile.files[0];
  if (!f) return;
  statusEl.className = 'status';
  statusEl.textContent = tr('pdfLoading');
  try {
    scoreText.value = await recognizePdf(f);
    applyScore(tr('pdfDone'));
    dirty = true;   // recognized score isn't in the library yet — guard against accidental discard
  } catch (err){
    statusEl.className = 'status warn';
    statusEl.textContent = '⚠ ' + err.message;
  }
  pdfFile.value = '';
});

/* ==================== Score library ================================== */
/* Built-in samples are virtual entries (not persisted, not deletable);
 * user scores live in localStorage. Option values are prefixed 'b:'/'u:'
 * and set via the DOM .value property, so names never need HTML-escaping.
 * Selecting an entry loads it (the select IS the load action); '+' opens
 * an inline name field; '✕' uses a two-tap arm/confirm instead of a
 * blocking dialog. When localStorage is unavailable (sandboxed preview,
 * private mode) the +/✕ buttons hide and built-ins keep working.        */
const LIB_KEY = 'handpan_scores_v1';
const BUILTINS = { 'Pocket Groove 11': DEFAULT_SCORE };

function libRead(){
  const s = store();
  if (!s) return {};
  try { return JSON.parse(s.getItem(LIB_KEY) || '{}'); } catch (e){ return {}; }
}
function libWrite(obj){ const s = store(); if (s) s.setItem(LIB_KEY, JSON.stringify(obj)); }

const libSel     = document.getElementById('libSel');
const btnLibSave = document.getElementById('btnLibSave');
const btnLibDel  = document.getElementById('btnLibDel');
const saveDlg    = document.getElementById('saveDlg');
const saveName   = document.getElementById('saveName');
let dirty = false, prevSel = null, delTimer = null;

// dirty = editor content diverges from the selected library entry;
// cleared on load/save, set on typing and after PDF recognition.
scoreText.addEventListener('input', () => { dirty = true; });

function selIsBuiltin(){ return libSel.value.startsWith('b:'); }
function selName(){ return libSel.value.slice(2); }

function disarmDelete(){
  btnLibDel.classList.remove('armed');
  btnLibDel.textContent = '✕';
  if (delTimer){ clearTimeout(delTimer); delTimer = null; }
}

function updateLibButtons(){
  const canStore = !!store();
  btnLibSave.style.display = canStore ? '' : 'none';
  btnLibDel.style.display  = canStore ? '' : 'none';
  btnLibDel.disabled = selIsBuiltin();
  disarmDelete();
}

function refreshLib(keepValue){
  const cur = keepValue || libSel.value;
  libSel.innerHTML = '';
  const gb = document.createElement('optgroup');
  gb.label = tr('builtinGroup');
  for (const n in BUILTINS){
    const o = document.createElement('option');
    o.value = 'b:' + n; o.textContent = n;
    gb.appendChild(o);
  }
  libSel.appendChild(gb);
  const names = Object.keys(libRead()).sort();
  if (names.length){
    const gu = document.createElement('optgroup');
    gu.label = tr('userGroup');
    for (const n of names){
      const o = document.createElement('option');
      o.value = 'u:' + n; o.textContent = n;
      gu.appendChild(o);
    }
    libSel.appendChild(gu);
  }
  libSel.value = (cur && [...libSel.options].some(o => o.value === cur))
                 ? cur : 'b:' + Object.keys(BUILTINS)[0];
  updateLibButtons();
}

function loadSelected(){
  const text = selIsBuiltin() ? BUILTINS[selName()] : libRead()[selName()];
  if (text == null) return;
  scoreText.value = text;
  applyScore(tr('loaded', selName()));
  dirty = false;
}

libSel.addEventListener('change', () => {
  if (dirty && !safeConfirm(tr('dirtyConfirm'))){
    if (prevSel) libSel.value = prevSel;   // revert the selection, keep the edits
    updateLibButtons();
    return;
  }
  prevSel = libSel.value;
  updateLibButtons();
  loadSelected();
});

btnLibSave.addEventListener('click', () => {
  const prefill = selIsBuiltin() ? '' : selName();    // prefill = quick overwrite
  if (typeof saveDlg.showModal !== 'function'){       // very old browsers: fall back to prompt()
    const n = prompt(tr('savePh'), prefill);
    if (n && n.trim()){ saveName.value = n.trim(); commitSave(); }
    return;
  }
  saveName.value = prefill;
  saveDlg.showModal();
  saveName.focus();
  saveName.select();
});
function commitSave(){
  const n = saveName.value.trim();
  if (!n) return;
  const lib = libRead();
  lib[n] = scoreText.value;
  libWrite(lib);
  if (saveDlg.open) saveDlg.close();
  dirty = false;
  refreshLib('u:' + n);
  prevSel = libSel.value;
  statusEl.className = 'status';
  statusEl.textContent = tr('saved', n);
}
document.getElementById('btnSaveOk').addEventListener('click', commitSave);
document.getElementById('btnSaveCancel').addEventListener('click', () => saveDlg.close());
saveName.addEventListener('keydown', e => {
  if (e.key === 'Enter'){ e.preventDefault(); commitSave(); }
  // Escape closes natively via the dialog's cancel behavior
});
// Clicking the backdrop closes the dialog (backdrop clicks target the <dialog> itself)
saveDlg.addEventListener('click', e => { if (e.target === saveDlg) saveDlg.close(); });

btnLibDel.addEventListener('click', () => {
  if (selIsBuiltin()) return;
  if (!btnLibDel.classList.contains('armed')){
    btnLibDel.classList.add('armed');          // first tap arms for 3 s
    btnLibDel.textContent = tr('sure');
    delTimer = setTimeout(disarmDelete, 3000);
    return;
  }
  const n = selName();
  const lib = libRead();
  delete lib[n];
  libWrite(lib);
  refreshLib('b:' + Object.keys(BUILTINS)[0]);
  prevSel = libSel.value;
  loadSelected();
  statusEl.className = 'status';
  statusEl.textContent = tr('deleted', n);
});

/* ==================== Language toggle ================================ */
const langBtn = document.getElementById('langBtn');
function setLang(l){
  lang = l;
  document.documentElement.lang = (l === 'zh') ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = tr(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = tr(el.dataset.i18nTitle); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = tr(el.dataset.i18nPh); });
  document.querySelectorAll('[data-i18n-aria]').forEach(el => { el.setAttribute('aria-label', tr(el.dataset.i18nAria)); });
  langBtn.textContent = (l === 'zh') ? 'EN' : '中';
  btnPlay.textContent = playing ? tr('pause') : tr('play');   // state-dependent, set after the sweep
  btnImmersive.textContent = immersive ? tr('exitImmersive') : tr('immersive');   // ditto
  const s = store(); if (s) s.setItem('handpan_lang', l);
  refreshLib();      // optgroup labels
  renderTrack();     // column tooltips
}
langBtn.addEventListener('click', () => setLang(lang === 'zh' ? 'en' : 'zh'));

document.getElementById('updateBanner').addEventListener('click', () => window.location.reload());

/* ==================== Immersive mode toggle =========================== */
const btnImmersive = document.getElementById('btnImmersive');
function setImmersive(v){
  immersive = v;
  document.body.classList.toggle('immersive', immersive);
  btnImmersive.textContent = immersive ? tr('exitImmersive') : tr('immersive');
  const s = store(); if (s) s.setItem('handpan_immersive', immersive ? '1' : '0');
}
btnImmersive.addEventListener('click', () => setImmersive(!immersive));

document.addEventListener('keydown', e => {
  const ae = document.activeElement;
  if (e.code === 'Space' && ae !== scoreText &&
      !['BUTTON', 'INPUT', 'SELECT'].includes(ae.tagName)){
    e.preventDefault();
    playing ? stopPlay() : startFrom(pos);
  }
});

/* ------------------------------ Init -------------------------------- */
// Score editor: collapsed by default on phones, open on desktop
const editWrap = document.getElementById('editWrap');
if (!window.matchMedia('(max-width:860px)').matches) editWrap.open = true;

document.body.classList.toggle('immersive', immersive);
setLang(lang);            // paints all static text + populates the library
prevSel = libSel.value;
loadSelected();           // built-in sample -> editor, parser, track view
</script>
